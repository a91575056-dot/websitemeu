[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "24"

[[redirects]]
  from = "https://www.dionisweb.com/*"
  to = "https://dionisweb.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/api/feedback"
  to = "/.netlify/functions/feedback"
  status = 200

[[redirects]]
  from = "/api/paypal/config"
  to = "/.netlify/functions/paypal-config"
  status = 200

[[redirects]]
  from = "/api/paypal/create-order"
  to = "/.netlify/functions/paypal-create-order"
  status = 200

[[redirects]]
  from = "/api/paypal/capture-order"
  to = "/.netlify/functions/paypal-capture-order"
  status = 200
